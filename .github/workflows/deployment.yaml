name: Deployment

on:
  pull_request:
    types: [ closed ]
    branches:
      - production

jobs:
  build-and-push-to-ghcr:
    environment: production
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Pnpm
        run: npm i -g pnpm@latest

      - name: Install Dependencies
        run: pnpm install

      - name: Build Image
        run: "docker build -t ghcr.io/${{github.actor}}/vantage_api:v0.1 ."

      - name: Login to GitHub Registry
        run: "echo ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin"

      - name: Push Image to Github Registry
        run: "docker push ghcr.io/${{github.actor}}/vantage_api:v0.1"

  build-and-push-to-google-cloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    env:
      DOCKER_IMAGE_NAME: "${{secrets.GCLOUD_ARTIFACT_REGISTRY_LOCATION}}-docker.pkg.dev/${{secrets.GCLOUD_PROJECT_ID}}/${{secrets.GCLOUD_ARTIFACT_REGISTRY_REPO_NAME}}/api__vantage:${{github.sha}}"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: gcloud-auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          credentials_json: ${{secrets.GCLOUD_CREDENTIALS_JSON}}

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure docker
        run: gcloud auth configure-docker ${{secrets.GCLOUD_ARTIFACT_REGISTRY_LOCATION}}-docker.pkg.dev

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{secrets.GCLOUD_ARTIFACT_REGISTRY_LOCATION}}-docker.pkg.dev
          username: "oauth2accesstoken"
          password: ${{steps.gcloud-auth.outputs.access_token}}

      - name: Build Image
        run: docker build -t ${{env.DOCKER_IMAGE_NAME}} .

      - name: Push Image
        run: docker push ${{env.DOCKER_IMAGE_NAME}}

      - name: Deploy Image
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: vantage-runner
          image: ${{env.DOCKER_IMAGE_NAME}}